<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-container">
    <!-- SIGN IN -->
    <div id="signInForm" class="auth-card">
        <h2>Sign In</h2>
        <input type="email" placeholder="Email" id="siEmail">
        <button onclick="handleSignIn()">Sign In</button>
        <p class="toggle-link">Account hin qabduu? <a href="#" onclick="toggleAuth()">Sign Up</a></p>
    </div>

    <!-- SIGN UP (Hidden) -->
    <div id="signUpForm" class="auth-card" style="display: none;">
        <h2>Sign Up</h2>
        <input type="email" placeholder="Email" id="suEmail">
        <button onclick="handleSignUp()">Sign Up</button>
        <p class="toggle-link">Account qabduu? <a href="#" onclick="toggleAuth()">Sign In</a></p>
    </div>
</div>

<script>
    function toggleAuth() {
        const signIn = document.getElementById('signInForm');
        const signUp = document.getElementById('signUpForm');
        if (signIn.style.display === 'none') {
            signIn.style.display = 'block';
            signUp.style.display = 'none';
        } else {
            signIn.style.display = 'none';
            signUp.style.display = 'block';
        }
    }

    function handleSignIn() {
        // Redirection kun akka hojjetuuf 'home.html' folder tokko keessa jiraachuu qaba
        window.location.href = "home.html";
    }

    function handleSignUp() {
        alert("Account created!");
        toggleAuth();
    }
</script>

</body>
</html>
